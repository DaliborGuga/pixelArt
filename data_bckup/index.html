        function changeTool(id_number)
        {
            for(let i = 0; i < tools.length; i++){
                tools[i] = 0;
            }
            tools[id_number] = 1;
            
            //highlight selected tool
            tools[0] == 0 ? (document.getElementById('pencil').style.backgroundColor = '#FFFFFF00') : (document.getElementById('pencil').style.backgroundColor = '#524561');
            tools[1] == 0 ? document.getElementById('eraser').style.backgroundColor = '#FFFFFF00' : document.getElementById('eraser').style.backgroundColor = '#524561';
            tools[2] == 0 ? document.getElementById('fill').style.backgroundColor = '#FFFFFF00' : document.getElementById('fill').style.backgroundColor = '#524561';
            tools[3] == 0 ? document.getElementById('colorpickertool').style.backgroundColor = '#FFFFFF00' : document.getElementById('colorpickertool').style.backgroundColor = '#524561';
        }
        
        function changeColor(tempcolor){
            color = tempcolor;
        }
        
        function changeMode(){
            live = !live;
            //highlight selection if true
            live ? document.getElementById('live').style.backgroundColor = '#FFFFFF00' : document.getElementById('live').style.backgroundColor = '#524561';
            
            //new POST request to the arduino to change mode
            var xhr = new XMLHttpRequest();
                xhr.open("POST", "mode", true);
                xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded; charset=UTF-8");
                xhr.send("mode="+live);
        }
        
        function draw(x,y,drawColor,post){
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var rect = canvas.getBoundingClientRect();
            var size = (rect.width / canvas_size);
            var index = (y*canvas_size+x);
            if(post && live){
                var xhr = new XMLHttpRequest();
                xhr.open("POST", "live", true);
                xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded; charset=UTF-8");
                xhr.send("i="+index+"&c="+drawColor.slice(1));
            }
            //update currentPattern array with the new color and draw new pixel on canvas
            currentPattern[y][x] = drawColor;
        
            x = x * size;
            y =  y* size;
            ctx.fillStyle= drawColor;
            if(drawColor == '#000000'||drawColor == '0x000000'){    //black pixel = transparent pixel (looks better)
                ctx.clearRect(x,y,size,size);
            }
            else{
                //console.log("Draw on X:"+ x +" Y:"+ y);
                ctx.fillRect(x,y,size,size);
            }
            drawGrid(0,0);                                          //redraw the grid
        }
        
        function drawGrid(x,y){
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var rect = canvas.getBoundingClientRect();
            var size = (rect.width / canvas_size);
            for(var i = 0; i < canvas_size; i++){
                for(var j = 0; j < canvas_size; j++){
                    x = i * size;
                    y =  j* size;
                    ctx.strokeRect(x,y,size,size);
                    }
                }  
        }
        
        function fill(x,y,referenceColor){
            
            // console.log("Fill y la concha de la madre");
            /*
            This is a very basic fill algorithm making use of recursion. I added a little delay to make it
            animate a little. Unfortunately the POST requests that "draw()" makes are quite slow
            Guga mete mano (cuando no) Limito iteraciones máximas del método (en fc del tamaño del canvas)
            Si quieren pinter de a más: que repitan la operación: es para evitar cuelgues and unresponsive
            app
            */
            setTimeout(function(){
                if(x>=0 && x<=(canvas_size-1) && y>=0 && y <=(canvas_size-1) && max_iterations>0 ){
                    max_iterations--;
                if(currentPattern[y][x] == referenceColor){
                    draw(x,y,color,1);
                    fill(x,y-1,referenceColor);
                    fill(x,y+1,referenceColor);
                    fill(x-1,y,referenceColor);
                    fill(x+1,y,referenceColor)
                    }
        
                }
            },40)
        }   
        // Intentando recoger el color desde el canvas
        function findPos(obj) {
            var curleft = 0, curtop = 0;
            if (obj.offsetParent) {
                do {
                    curleft += obj.offsetLeft;
                    curtop += obj.offsetTop;
                } while (obj = obj.offsetParent);
                return { x: curleft, y: curtop };
            }
            return undefined;
        }            
        function rgbToHex(r, g, b) {
            if (r > 255 || g > 255 || b > 255)
            throw "Invalid color component";
            return ((r << 16) | (g << 8) | b).toString(16);
        }
        // OJO; las coordenadas desde las que debo chupar el color las saqué a huevo
        // No pude hacerlo relativo al canvas; como las otras funciones
        // pero funciona!                
        function pickcolorguga(x,y){
            var example = document.getElementById('canvas');
            var context = example.getContext('2d');
           // console.log("Read color from X:"+ x + " Y:" + y);
            var p = context.getImageData(x, y, 1, 1); 
            var hex = "#" + ("000000" + rgbToHex(p.data[0], p.data[1], p.data[2])).slice(-6);
           // console.log("Pixel color" + String(p.data[0]));
          //  console.log("Pick Color Guga X:"+String(x)+"Y:"+String(y) +"color:"+String(hex));
        
            //var pickedColor = document.getElementById("pickedColor");           
            //pickedColor = hex;
          //  color = pickedColor;
            document.getElementById('pickedColorGuga').style.backgroundColor = hex;
            last_picked_color_guga = hex;
            changeColor(hex);
        }
        // Fn de intentando
        
        function clearCanvas(){
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,canvas.width,canvas.height);
        
            for(var i=0; i<canvas_size; i++){
                    for(var j=0; j<canvas_size; j++){
                        currentPattern[i][j] = '#000000'
                    }

                xhr.open("POST", "live", true);
                xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded; charset=UTF-8");
                xhr.send("cl=1");
            }

        function deletePattern(){

                    xhr.open("POST", "delete", true);
                    xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded; charset=UTF-8");
                    var message = "name=" + name;
                    xhr.send(message);

        // Fetch para solicitude funciona mejor que xmlhttp
        async function postData(url = '', data = {} , options = {} ) {
            // Opciones por defecto estan marcadas con un *
            //console.log(data);
            const { timeout = 5000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);

            const response = await fetch(url, {
                method: 'POST', // *GET, POST, PUT, DELETE, etc.
                mode: 'cors', // no-cors, *cors, same-origin
                cache: 'no-cache', // *default, no-cache, reload, force-cache, only-if-cached
                credentials: 'same-origin', // include, *same-origin, omit
                headers: {
                'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8', //con este works la solicitud
                'Accept': 'application/json',    //y con este works

                // 'Content-Type': 'application/octet-stream', //con este el esp no entiende el id de pregunta

                // 'Content-Type': 'text/html',
                // 'Accept': 'application/json, text/plain, */*, application/octet-stream', //
                },
                redirect: 'follow', // manual, *follow, error
                referrerPolicy: 'no-referrer', // no-referrer, *no-referrer-when-downgrade, origin, origin-when-cross-origin, same-origin, strict-origin, strict-origin-when-cross-origin, unsafe-url
                body: String(data),          // body data type must match "Content-Type" header
                options,
                signal: controller.signal
            })
            const resText = await response.text();
            // console.log(resText);

            // console.log(response.body);
            // console.log(response.text);
            // var data_array = response.text().toString();//            responseText();// arrayBuffer();
            // console.log(data_array);

            // var loadedPattern = response.arrayBuffer.arguments(); //.split("\n");
            // //var string_array = data_array.split("\n");
            // console.log(loadedPattern);
            // // var array_string = data_array.toString();
            
            // // console.log(array_string);
            // // var enc = new TextDecoder("utf-8");
            // // console.log(enc.decode(data_array));
            clearTimeout(id);
            // return (string_array);

            return (resText);
        }

        function loadPatternChunked()
        {
            var print_on_web = new Boolean(true);
            var select = document.getElementById("selection");      //veo a cual file le hicieron click (en la web app)
            var id = select.value;
            var message = "id="+id;
            var loadedPattern;
            postData( 'http://'+window.location.hostname+'/load', message)
            .then(data => {
                // console.log(data);  // JSON data parsed by `data.json()` call
                //console.log(JSON.stringify(data));
                loadedPattern = data.split("\n");
                // loadedPattern = data.slice(-6); //
                console.log(loadedPattern);

                if(loadedPattern.length == 257)
                {
                    console.log("Canvas 16x16-infered from file");
                    canvas_size = 16;
                }
                else if (loadedPattern.length == 1025)
                {
                    console.log("Canvas 32x32-infered from file");
                    canvas_size = 32;
                }
                else if(loadedPattern.length == 4097)
                {
                    console.log("Canvas 64x64-infered from file");
                    canvas_size = 64;
                }
                else 
                {
                    print_on_web = false;   //llegaron, chunks; llegó el último, 
                    console.log("Falló la lectura o se perdieron chunks; o algo paso");
                    // window.alert("Falló la lectura; por favor, reintente");
                }
                if(print_on_web == true)
                {    
                    console.log("Supuestamente todo bien");
                    var t0 = performance.now();
                    //create a 2 dimensional array to store the current pattern
                    var canvas = document.getElementById('canvas');
                    var ctx = canvas.getContext('2d');
                    var rect = canvas.getBoundingClientRect();
                    var size = (rect.width / canvas_size);
                    // drawGrid(0,0);  //ver donde poner para que arregle el grid!
                    for(var i=0; i<canvas_size; i++)
                    {
                        currentPattern[i] = new Array(canvas_size);
                    }
                    // currentPattern = new Array(canvas_size); 
                    for(var i=0; i<canvas_size; i++)
                    {
                        for(var j=0; j<canvas_size; j++)
                        {
                            currentPattern[i][j] = '#'+loadedPattern[i*canvas_size+j].slice(2);
                            x = j *size;
                            y = i *size;
                            ctx.fillStyle = currentPattern[i][j];
                            // yo estaba dibujando BLACK! en lugar de transparente y las lineas YA ERAN NEGRAS
                            if(currentPattern[i][j] == '#000000'|| currentPattern[i][j] == '0x000000'){    //black pixel = transparent pixel (looks better)
                                ctx.clearRect(x,y,size,size);
                                // console.log("transparent!");
                            }    
                            else
                            {                        
                                ctx.fillRect(x,y,size,size);
                            }
                        }
                    }
                    drawGrid(0,0);
                    var t1=performance.now();
                    console.log("Took: "+(t1-t0)+"msecs");            
                }
            });
        }

        // Cuando la respuesta no entre en una sola respuesta se romperá
        // todo; asi que hago la entrega de nombres "chunkeable"

        function transferCompleteNames(evt) 
        {
            console.log("La transferencia se ha completado.");
            if (this.status != 200) 
            { // analiza el estado HTTP de la respuesta
                // alert(`Error ${this.status}: ${this.statusText}`); // ej. 404: No encontrado
                console.log("Some error");
            } 
            else 
            {   // muestra el resultado
                var selection = document.getElementById("selection");
                // alert(`Hecho, obtenidos ${this.response.length} bytes`); // Respuesta del servidor
                
                // names = JSON.parse(this.responseText);
                names = this.responseText.split("\n");
                
                console.log("Find names:",names);
                for(var i=0; i<names.length; i++){
                    if(!(names[i].includes("^"))){
                    var option = document.createElement('option');
                    option.value = i;
                    option.innerHTML = names[i];
                    selection.appendChild(option);
                    }
                }          
            }
        }
        function transferFailedNames(evt) 
        {
            console.log("Se ha producido un error al transferir el archivo names.txt");
        }
        
        function getNames()
        {
            // var selection = document.getElementById("selection");
            //make a new GET request to the arduino which reads the names from the SD card
            var xmlHttp = new XMLHttpRequest();
        
            xmlHttp.open("GET", "get", true );
            xmlHttp.ontimeout = () => 
            {
                console.log(`The request timed out.`);
                xmlHttp.abort();
                return;
            };    
            xmlHttp.addEventListener("load", transferCompleteNames);
            xmlHttp.addEventListener("error", transferFailedNames);
            xmlHttp.timeout = 3500;
            xmlHttp.send();
        }

        //gets executed when the web page is loaded
        function initialise()
        {
            
            //get the parameters of the canvas and draw the grid
            var canvas = document.getElementById("canvas");
            var size = canvas.clientWidth;
            canvas.height = size;
            canvas.width = size;
            drawGrid(0,0);
            changeTool('0');
        
            //create a 2 dimensional array to store the current pattern
            for(var i=0; i<canvas_size; i++)
            {
                currentPattern[i] = new Array(canvas_size);
            }
            for(var i=0; i<canvas_size; i++)
            {
                for(var j=0; j<canvas_size; j++)
                {
                    currentPattern[i][j] = '#000000'
                }
            }
                //get the names and change the mode to live drawing
            getNames(); //comento mientras pruebo huevadas!
            changeMode();

            //getCanvasSizes();
        }

        function redrawcanvasselector()
        {
            console.log("Re Draw Canvas ON SELECTOR selection ");
        
            var selector_size = document.getElementById("selectionPX");
            if(selector_size.value == 1)
            {
                console.log("Selector canvas 16x16");
                canvas_size = 16;
            }
            else if(selector_size.value == 2)
            {
                console.log("Selector canvas 32x32");
                canvas_size = 32;
            }
            else if(selector_size.value == 3)
            {
                console.log("Selector canvas 64x64");
                canvas_size = 64;
            }                
         //get the parameters of the canvas and draw the grid
            var canvas = document.getElementById("canvas");
            var size = canvas.clientWidth;
            canvas.height = size;
            canvas.width = size;
            drawGrid(0,0);
            changeTool('0');
        
            //create a 2 dimensional array to store the current pattern
            for(var i=0; i<canvas_size; i++)
            {
                currentPattern[i] = new Array(canvas_size);
            }
            for(var i=0; i<canvas_size; i++)
            {
                for(var j=0; j<canvas_size; j++)
                {
                    currentPattern[i][j] = '#000000'
                }
            }
